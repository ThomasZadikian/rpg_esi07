name: Backend CI

on:
  push:
    branches:
      - develop
    paths:
      - 'backend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          
      - name: Restore
        run: dotnet restore RPG_ESI07.slnx
        
      - name: Build
        run: dotnet build RPG_ESI07.slnx --no-restore --configuration Release
        
      - name: Test
        run: dotnet test RPG_ESI07.slnx --no-build --verbosity normal --configuration Release